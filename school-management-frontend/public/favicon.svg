<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="50%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    
    <!-- Accent Gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>

    <!-- White Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Shield/Rounded Hexagon -->
  <rect x="32" y="32" width="448" height="448" rx="128" fill="url(#bgGrad)" />

  <!-- Inner border ring -->
  <rect x="56" y="56" width="400" height="400" rx="108" fill="none" stroke="#ffffff" stroke-width="8" stroke-opacity="0.2" />

  <!-- Stylized graduation cap & book outline + E/P curves -->
  <g transform="translate(256, 230)" filter="url(#glow)">
    <!-- Graduation Cap Top / Diamond -->
    <polygon points="0,-120 140,-40 0,40 -140,-40" fill="#ffffff" />
    
    <!-- Ribbon/Tassel -->
    <path d="M 0,40 L 90,90 L 90,150" fill="none" stroke="#e0f2fe" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
    <circle cx="90" cy="155" r="14" fill="#38bdf8" />
    
    <!-- Book/Cap Base / Stylized E & P Intersection -->
    <!-- Curved wing representing an open book and letter 'E' and 'P' -->
    <path d="M -90,-20 L -90,50 C -90,80 -60,100 0,100 C 60,100 90,80 90,50 L 90,-20" fill="none" stroke="#ffffff" stroke-width="24" stroke-linecap="round" />
    <path d="M 0,100 L 0,150" fill="none" stroke="#ffffff" stroke-width="24" stroke-linecap="round" />
    
    <!-- Stylized sparkles representing growth & AI -->
    <path d="M -160,-140 L -140,-140 M -150,-150 L -150,-130" stroke="#38bdf8" stroke-width="8" stroke-linecap="round" />
    <path d="M 160,-140 L 180,-140 M 170,-150 L 170,-130" stroke="#38bdf8" stroke-width="8" stroke-linecap="round" />
  </g>

  <!-- EduPro text elements inside SVG for fallback styling -->
  <text x="256" y="445" font-family="'Outfit', 'Inter', system-ui" font-size="56" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="4">EDUPRO</text>
</svg>